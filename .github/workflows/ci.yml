name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l ./tui/...)"

      - name: Run tests
        run: go test -C tui ./...

      - name: Run vet
        run: go vet -C tui ./...

      - name: Build
        run: go build -C tui ./cmd/brain
