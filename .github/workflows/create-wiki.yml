          **Next:** [[Commands Reference]] | [[Features]]
          WIKIEOF

          cat > Configuration.md << 'WIKIEOF'
          # Configuration

          ## Global Config (`~/.config/secondbrain/`)

          ### `config.yaml`

          ```yaml
          llm:
            model: "gpt-4o"
            max_tokens: 4096
            base_url: "https://api.ai.public.rakuten-it.com/openai/v1"

          embeddings:
            model: "text-embedding-3-small"
            base_url: "https://api.ai.public.rakuten-it.com/openai/v1"

          rag:
            chunk_size: 1500      # characters per chunk
            top_k: 5              # max chunks retrieved per query
            min_similarity: 0.25  # discard chunks below this cosine score
          ```

          ### `.env`

          ```
          RAKUTEN_AI_GATEWAY_KEY=your_key_here
          ```

          ---

          ## Config Commands

          | Command | Description |
          |---------|-------------|
          | `/config` | Show config directory and settings |
          | `/config key` | Show masked API key |
          | `/config reset` | Remove config — triggers setup on next launch |
          | `/logout` | Same as `/config reset` |

          ---

          **Next:** [[Directory Layout]] | [[Getting Started]]
          WIKIEOF

          cat > Directory-Layout.md << 'WIKIEOF'
          # Directory Layout

          ## Project Directory

          ```
          <your-project>/
          ├── raw/                          ← Drop any files here (immutable)
          ├── wiki/
          │   ├── sources/                  ← One summary per raw source
          │   ├── entities/                 ← People, orgs, products, tools
          │   ├── concepts/                 ← Ideas, patterns, theories
          │   ├── synthesis/                ← Saved query results
          │   ├── index.md                  ← Auto-maintained catalog
          │   └── log.md                    ← Operation history
          └── knowledge-base/
              ├── embeddings/store.json     ← Vector store
              ├── metadata/sources.json     ← Content hashes
              ├── amendments/               ← Correction audit trail
              └── output/                   ← Reports and exports
          ```

          ## Global Config

          ```
          ~/.config/secondbrain/
          ├── config.yaml                   ← Global model + RAG settings
          └── .env                          ← API key (600 permissions)
          ```

          ---

          **Next:** [[Configuration]] | [[How It Works ― The Pipeline]]
          WIKIEOF

          cat > 'How-It-Works-The-Pipeline.md' << 'WIKIEOF'
          # How It Works — The Pipeline

          ## Pipeline Flow

          ```
          Drop file into raw/
                  │
                  ▼  (auto after 3s, or /pull)
          [Analyzer — LLM]
            · Reads file content (text, code, or vision for images)
            · Checks wiki/index.md for existing related pages
            · Returns JSON: pages to create/update + log entry
                  │
                  ▼
          wiki/ pages written
            wiki/sources/slug.md
            wiki/entities/name.md
            wiki/concepts/name.md
            (typically 5–15 pages per source)
                  │
                  ▼  (/sync or auto after /pull)
          [Embeddings]
            · Chunks each wiki page by paragraph
            · Embeds via text-embedding-3-small
            · Stores in knowledge-base/embeddings/store.json
                  │
                  ▼  (on question)
          [RAG Query]
            · Embeds question
            · Cosine search → top-K chunks filtered by min_similarity
            · LLM answers from wiki context only
            · LLM scores each reference by actual contribution
          ```

          ---

          ## Step Details

          1. **File Detection** — `fsnotify` watches `raw/`; 3-second debounce; hash check skips unchanged files
          2. **Analysis** — LLM reads content, checks existing wiki, returns JSON array of pages
          3. **Wiki Writing** — pages written; existing pages merged; `wiki/log.md` updated
          4. **Embedding** — pages chunked and embedded; vectors stored in flat JSON
          5. **Query** — question embedded; cosine search; LLM answers from wiki context only

          ---

          **Next:** [[Architecture]] | [[Features]]
          WIKIEOF

          cat > Use-Cases.md << 'WIKIEOF'
          # Use Cases

          ## 1. Deep Research

          Drop papers and articles into `raw/` over weeks. The brain builds an interlinked wiki of concepts, entities, and findings — automatically cross-referenced. By the end you have a structured knowledge base, not a pile of highlights.

          **Flow:** Drop paper → `/pull` → wiki pages created → ask follow-up questions → `/save` syntheses

          ---

          ## 2. Codebase Documentation

          Point the brain at a cloned repository. It reads architecture, patterns, modules, and dependencies — and writes a living wiki. New teammates onboard by querying the brain.

          **Flow:** Clone repo into `raw/` → `/pull` → wiki created with architecture, patterns, open questions

          ---

          ## 3. Team Knowledge Base

          Feed Slack threads, meeting transcripts, design docs, and customer notes. The brain maintains a shared wiki that no one has to manually update.

          **Flow:** Export Slack/Notion → drop into `raw/` → wiki grows → team queries instead of searching Slack

          ---

          ## Other Use Cases

          - **Personal learning journal** — drop articles; build a personal reference wiki
          - **Meeting intelligence** — drop transcripts; query past decisions
          - **Competitive intelligence** — track competitor signals over time

          ---

          **Next:** [[Getting Started]] | [[Features]] | [[Commands Reference]]
          WIKIEOF

      - name: Push wiki content
        run: |
          cd wiki-repo
          git add .
          git diff --cached --quiet && echo "No changes" || git commit -m "Initialize wiki with comprehensive documentation"
          git push origin HEAD:master || git push origin HEAD:main
